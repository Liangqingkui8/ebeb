<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>六合彩 · 全功能玩家端</title>
    <style>
        /* 样式与原版完全相同，为节省篇幅在此省略，请直接使用原版的全部样式 */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:#EFF3F8; font-family:'Segoe UI',Roboto,system-ui; padding:16px 12px 32px; color:#1E2A3E; }
        .app-container { max-width:550px; margin:0 auto; }
        .card { background:white; border-radius:28px; padding:18px 16px; margin-bottom:16px; box-shadow:0 4px 14px rgba(0,0,0,0.03); }
        .info-row { display:flex; justify-content:space-between; align-items:center; background:#FFF; border-radius:48px; padding:8px 20px; margin-bottom:16px; flex-wrap:wrap; gap:8px; }
        .wallet-section { display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
        .wallet-label { font-weight:600; color:#4A627A; font-size:0.85rem; }
        .wallet-amount { font-size:1.7rem; font-weight:800; color:#1E6F5C; letter-spacing:-0.5px; }
        .wallet-unit { font-size:0.85rem; color:#6C86A3; }
        .action-buttons { display:flex; gap:8px; }
        .action-btn { background:#EFF3F8; border:none; padding:6px 16px; border-radius:40px; font-weight:600; font-size:0.8rem; cursor:pointer; color:#2C7DA0; }
        .issue-number { background:#1E6F5C20; padding:6px 14px; border-radius:40px; font-weight:700; font-size:0.9rem; color:#1E6F5C; }
        .draw-section { text-align:center; }
        .section-title { font-size:0.75rem; font-weight:500; color:#5E7A9A; margin-bottom:14px; }
        .balls-row { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-bottom:5px; }
        .lottery-item { text-align:center; width:62px; }
        .lottery-ball { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.4rem; font-weight:800; background:#F0F4F9; color:#1E2A3E; box-shadow:0 2px 5px rgba(0,0,0,0.1); margin-bottom:6px; }
        .ball-red { background:#FFB3B3; color:#8B0000; box-shadow:inset 0 0 0 2px #D32F2F; }
        .ball-blue { background:#A8D0FF; color:#003f6f; box-shadow:inset 0 0 0 2px #1976D2; }
        .ball-green { background:#A5D6B7; color:#1B5E20; box-shadow:inset 0 0 0 2px #2E7D32; }
        .special-ball { background:#FFE0A3; box-shadow:inset 0 0 0 2px #FF8C00; position:relative; }
        .special-ball::after { content:"★"; position:absolute; top:-6px; right:-6px; font-size:16px; color:#F57C00; }
        .ball-zodiac { font-size:0.65rem; font-weight:500; color:#4E5B6E; background:#F4F7FC; display:inline-block; padding:2px 8px; border-radius:20px; }
        .timer-status { margin-top:12px; }
        .timer-text { font-family:monospace; background:#EDF2F9; display:inline-block; padding:5px 14px; border-radius:30px; font-size:0.9rem; font-weight:600; }
        .status-badge { margin-left:8px; font-size:0.7rem; background:#A5D6B7; padding:4px 10px; border-radius:30px; color:#1B5E20; }
        .bet-header { display:flex; justify-content:space-between; align-items:center; cursor:pointer; margin-bottom:12px; font-weight:700; color:#1E2A3E; }
        .collapse-icon { font-size:1.2rem; transition:transform 0.2s; }
        .bet-content.collapsed { display:none; }
        .bet-tabs { display:flex; gap:8px; margin-bottom:18px; background:#F1F4F9; border-radius:60px; padding:4px; }
        .tab-btn { flex:1; text-align:center; padding:6px 0; border-radius:48px; font-weight:600; font-size:0.75rem; background:transparent; color:#4A627A; cursor:pointer; }
        .tab-btn.active { background:white; color:#1E6F5C; box-shadow:0 1px 4px rgba(0,0,0,0.05); }
        .grid-7, .grid-12 { display:grid; gap:6px; margin:14px 0 10px; }
        .grid-7 { grid-template-columns:repeat(7,1fr); }
        .grid-12 { grid-template-columns:repeat(4,1fr); }
        .bet-option { background:#F4F7FC; border-radius:40px; text-align:center; padding:8px 0; font-weight:600; font-size:0.85rem; border:1px solid #E2EAF2; cursor:pointer; }
        .bet-option.selected { background:#1E6F5C; color:white; border-color:#1E6F5C; }
        .bet-red { background:#FFD9D4; color:#B71C1C; border-color:#FFAB91; }
        .bet-blue { background:#D4E4FF; color:#0D47A1; border-color:#90CAF9; }
        .bet-green { background:#C8E6D9; color:#1B5E20; border-color:#81C784; }
        .selected-info { background:#F0F4F9; border-radius:28px; padding:10px 12px; font-size:0.75rem; margin:10px 0; max-height:100px; overflow-y:auto; }
        .bet-control { display:flex; gap:10px; margin:12px 0 8px; }
        .amount-input { flex:2; background:#F1F4F9; border:none; padding:10px 14px; border-radius:48px; font-size:0.9rem; outline:none; }
        .place-bet-btn { flex:1; background:#2C7DA0; border:none; padding:10px 0; border-radius:48px; color:white; font-weight:700; cursor:pointer; }
        .place-bet-btn.disabled { background:#AFC4D6; pointer-events:none; opacity:0.6; }
        .my-bets { background:#F8FAFE; border-radius:24px; padding:10px; margin-top:12px; font-size:0.75rem; max-height:150px; overflow-y:auto; }
        .bet-item { display:flex; justify-content:space-between; padding:6px 4px; border-bottom:1px solid #E9EDF2; }
        .history-tabs { display:flex; gap:10px; margin-bottom:12px; }
        .history-tab { flex:1; text-align:center; padding:6px 0; background:#EDF2F9; border-radius:60px; font-size:0.75rem; font-weight:600; cursor:pointer; color:#4A627A; }
        .history-tab.active { background:#1E6F5C; color:white; }
        .history-list { max-height:260px; overflow-y:auto; }
        .history-item { background:#F8FAFE; border-radius:20px; padding:10px; margin-bottom:8px; }
        .history-header-line { display:flex; justify-content:space-between; font-size:0.7rem; margin-bottom:6px; color:#5E7A9A; cursor:pointer; }
        .expand-icon { font-size:0.7rem; }
        .history-numbers { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
        .history-ball-item { text-align:center; width:48px; }
        .history-ball { width:40px; height:40px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:0.9rem; }
        .history-zodiac { font-size:0.55rem; margin-top:2px; }
        .bet-detail { margin-top:8px; padding-top:6px; border-top:1px dashed #CDD9ED; font-size:0.7rem; background:#FFFFFF90; border-radius:16px; padding:8px; }
        .modal-mask { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:1000; }
        .modal-container { background:white; width:320px; border-radius:32px; padding:24px 20px; text-align:center; }
        .modal-title { font-size:1.3rem; font-weight:700; margin-bottom:20px; }
        .modal-input { width:100%; padding:12px; border-radius:60px; border:1px solid #CDD9ED; margin:8px 0; font-size:1rem; text-align:center; }
        .modal-buttons { display:flex; gap:12px; margin-top:20px; }
        .modal-btn { flex:1; padding:10px; border-radius:60px; border:none; font-weight:600; cursor:pointer; }
        .modal-btn-primary { background:#2C7DA0; color:white; }
        .modal-btn-secondary { background:#EFF3F8; color:#4A627A; }
        .center-toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#1E2A3Ee6; backdrop-filter:blur(12px); color:white; padding:12px 24px; border-radius:60px; font-weight:600; font-size:1rem; z-index:1100; opacity:0; transition:0.2s; pointer-events:none; white-space:nowrap; }
        .footnote { font-size:0.6rem; text-align:center; color:#8AA0BB; margin-top:12px; }
        .user-info { display:flex; align-items:center; gap:8px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="info-row">
        <div class="wallet-section">
            <span class="wallet-label">💰 钱包</span>
            <span class="wallet-amount" id="walletAmount">0</span>
            <span class="wallet-unit">元</span>
            <div class="action-buttons">
                <button id="rechargeBtn" class="action-btn">充值</button>
                <button id="withdrawBtn" class="action-btn">提现</button>
            </div>
        </div>
        <div class="user-info">
            <span id="userInfo" style="font-size:0.8rem;">未登录</span>
            <button id="loginBtn" class="action-btn" style="padding:4px 12px;">登录/注册</button>
        </div>
        <div class="issue-number" id="issueNumber">第101期</div>
    </div>

    <div class="card draw-section">
        <div class="section-title">🎲 六合彩 · 全玩家同步开奖 🎲</div>
        <div class="balls-row" id="drawBallsRow"></div>
        <div class="timer-status">
            <span class="timer-text" id="countdownDisplay">02:00</span>
            <span class="status-badge" id="statusBadge">📊 投注中</span>
        </div>
        <div style="font-size: 0.6rem; margin-top: 6px;">⏱️ 动态间隔 · 实时同步</div>
    </div>

    <div class="card" id="betCard">
        <div class="bet-header" id="collapseHeader">
            <span>🎯 多选下注 (特码/生肖/平肖)</span>
            <span class="collapse-icon" id="collapseIcon">▼</span>
        </div>
        <div class="bet-content" id="betContent">
            <div class="bet-tabs">
                <div class="tab-btn" data-type="number">🔢 特码号码</div>
                <div class="tab-btn" data-type="zodiac">🐉 特码生肖</div>
                <div class="tab-btn" data-type="pingxiao">🐾 平肖</div>
            </div>
            <div id="betSelectionArea"></div>
            <div id="selectedPreview" class="selected-info">未选中任何选项</div>
            <div class="bet-control">
                <input type="number" id="betAmount" class="amount-input" placeholder="单个金额" value="0" step="1" min="0">
                <button id="placeBetBtn" class="place-bet-btn">📌 批量下注</button>
            </div>
            <div class="my-bets">
                <div style="font-weight:600; margin-bottom: 5px;">📋 本期投注单</div>
                <div id="betsListContainer" class="empty-bets">暂无投注</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="history-tabs">
            <div class="history-tab active" data-hist="draw">📜 开奖记录</div>
            <div class="history-tab" data-hist="bet">🎲 投注记录</div>
        </div>
        <div id="historyContainer" class="history-list"></div>
    </div>
    <div class="footnote">⚡ 赔率动态调整 | 实时公告</div>
</div>
<div id="centerToast" class="center-toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { getDatabase, ref, set, get, onValue, update, push, runTransaction } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDDUSNfKEAs-OQqF7MKnLbrVeBarHExjT0",
        authDomain: "liuhecai-6f558.firebaseapp.com",
        projectId: "liuhecai-6f558",
        storageBucket: "liuhecai-6f558.firebasestorage.app",
        messagingSenderId: "688353258862",
        appId: "1:688353258862:web:c847f40e40cd62f531e57f",
        measurementId: "G-GK5NN15RBQ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // ---------- 全局变量 ----------
    let currentUser = null;
    let wallet = 0;
    let currentLotteryNumbers = [];
    let currentIssue = 101;
    let nextDrawTimestamp = 0;
    let isDrawing = false;
    let bets = [];
    let selectedValues = new Set();
    let currentBetType = "number";
    let phase = "betting";
    let countdownInterval = null;
    let historyRecords = [];
    let expandedBetIssues = new Set();
    let isCollapsed = false;
    let odds = { number: 45, zodiac: 11, pingxiao: 2 };
    let drawInterval = 120; // 秒
    let userBanned = false;

    // DOM
    const walletSpan = document.getElementById('walletAmount');
    const drawBallsRow = document.getElementById('drawBallsRow');
    const countdownDisplay = document.getElementById('countdownDisplay');
    const statusBadge = document.getElementById('statusBadge');
    const issueNumberSpan = document.getElementById('issueNumber');
    const betSelectionArea = document.getElementById('betSelectionArea');
    const selectedPreview = document.getElementById('selectedPreview');
    const betAmountInput = document.getElementById('betAmount');
    const placeBetBtn = document.getElementById('placeBetBtn');
    const betsListContainer = document.getElementById('betsListContainer');
    const historyContainer = document.getElementById('historyContainer');
    const collapseHeader = document.getElementById('collapseHeader');
    const betContent = document.getElementById('betContent');
    const collapseIcon = document.getElementById('collapseIcon');
    const centerToast = document.getElementById('centerToast');
    const rechargeBtn = document.getElementById('rechargeBtn');
    const withdrawBtn = document.getElementById('withdrawBtn');
    const loginBtn = document.getElementById('loginBtn');
    const userInfoSpan = document.getElementById('userInfo');

    function showCenterToast(msg, duration=2000) {
        centerToast.textContent = msg;
        centerToast.style.opacity = '1';
        setTimeout(() => centerToast.style.opacity = '0', duration);
    }

    function updateWalletUI() {
        walletSpan.innerText = Math.floor(wallet);
        if (!currentUser || wallet <= 0 || phase !== 'betting' || userBanned) {
            placeBetBtn.disabled = true;
        } else {
            placeBetBtn.disabled = false;
        }
    }

    // 监听公告
    function listenAnnouncement() {
        const announcementRef = ref(db, 'announcements/latest');
        onValue(announcementRef, (snap) => {
            const data = snap.val();
            if (data && data.msg) {
                showCenterToast(`📢 公告：${data.msg}`, 5000);
            }
        });
    }

    // 监听用户封禁状态
    function listenUserBanned(uid) {
        const bannedRef = ref(db, `users/${uid}/banned`);
        onValue(bannedRef, (snap) => {
            userBanned = snap.val() === true;
            updateWalletUI();
            if (userBanned) {
                showCenterToast("您的账号已被封禁，无法下注和充值");
            }
        });
    }

    // 监听系统赔率配置
    function listenOdds() {
        const oddsRef = ref(db, 'config/odds');
        onValue(oddsRef, (snap) => {
            const data = snap.val();
            if (data) {
                odds = { number: data.number || 45, zodiac: data.zodiac || 11, pingxiao: data.pingxiao || 2 };
            }
        });
    }

    // 监听开奖间隔配置
    async function loadDrawInterval() {
        const snap = await get(ref(db, 'config/draw_interval'));
        if (snap.exists()) {
            drawInterval = snap.val();
        } else {
            drawInterval = 120;
        }
        return drawInterval;
    }

    // 颜色生肖映射（与原代码相同）
    const redNumbers = [1,2,7,8,12,13,18,19,23,24,29,30,34,35,40,45,46];
    const blueNumbers = [3,4,9,10,14,15,20,25,26,31,36,37,41,42,47,48];
    const greenNumbers = [5,6,11,16,17,21,22,27,28,32,33,38,39,43,44,49];
    const zodiacGroups = {
        "🐎 马": [1,13,25,37,49], "🐍 蛇": [2,14,26,38], "🐉 龙": [3,15,27,39],
        "🐇 兔": [4,16,28,40], "🐅 虎": [5,17,29,41], "🐂 牛": [6,18,30,42],
        "🐀 鼠": [7,19,31,43], "🐖 猪": [8,20,32,44], "🐕 狗": [9,21,33,45],
        "🐓 鸡": [10,22,34,46], "🐒 猴": [11,23,35,47], "🐑 羊": [12,24,36,48]
    };
    const zodiacList = Object.keys(zodiacGroups);
    function getNumberColor(num) {
        if (redNumbers.includes(num)) return 'ball-red';
        if (blueNumbers.includes(num)) return 'ball-blue';
        return 'ball-green';
    }
    function getBetColor(num) {
        if (redNumbers.includes(num)) return 'bet-red';
        if (blueNumbers.includes(num)) return 'bet-blue';
        return 'bet-green';
    }
    function getZodiacByNum(num) {
        for (let [z, nums] of Object.entries(zodiacGroups)) if (nums.includes(num)) return z;
        return "🐉 龙";
    }
    function generateUniqueNumbers() {
        const nums = new Set();
        while (nums.size < 7) nums.add(Math.floor(Math.random() * 49) + 1);
        return Array.from(nums);
    }

    async function initializeLotteryState() {
        const stateRef = ref(db, 'lottery_state');
        const snapshot = await get(stateRef);
        if (!snapshot.exists()) {
            const initNumbers = generateUniqueNumbers();
            const initTimestamp = Date.now() + drawInterval * 1000;
            await set(stateRef, {
                currentIssue: 101,
                currentNumbers: initNumbers,
                nextDrawTimestamp: initTimestamp,
                isDrawing: false
            });
            console.log("初始化 lottery_state 成功");
        }
    }

    function renderDrawNumbers(numbers) {
        drawBallsRow.innerHTML = '';
        numbers.forEach((num, idx) => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'lottery-item';
            const ballDiv = document.createElement('div');
            ballDiv.className = `lottery-ball ${getNumberColor(num)}`;
            if (idx === 6) ballDiv.classList.add('special-ball');
            ballDiv.innerText = num < 10 ? '0'+num : ''+num;
            const zodiacSpan = document.createElement('div');
            zodiacSpan.className = 'ball-zodiac';
            zodiacSpan.innerText = `(${getZodiacByNum(num)})`;
            itemDiv.appendChild(ballDiv);
            itemDiv.appendChild(zodiacSpan);
            drawBallsRow.appendChild(itemDiv);
        });
    }

    function renderBetSelection() {
        betSelectionArea.innerHTML = '';
        if (currentBetType === 'number') {
            const grid = document.createElement('div');
            grid.className = 'grid-7';
            for (let i=1; i<=49; i++) {
                const btn = document.createElement('div');
                btn.className = `bet-option ${getBetColor(i)}`;
                if (selectedValues.has(i)) btn.classList.add('selected');
                btn.innerText = i < 10 ? '0'+i : ''+i;
                btn.addEventListener('click', () => {
                    if (!currentUser) { showCenterToast("请先登录"); return; }
                    if (phase !== 'betting') { showCenterToast("开奖中，请等待下期"); return; }
                    if (userBanned) { showCenterToast("账号已被封禁"); return; }
                    if (selectedValues.has(i)) selectedValues.delete(i);
                    else selectedValues.add(i);
                    renderBetSelection();
                    updateSelectedPreview();
                });
                grid.appendChild(btn);
            }
            betSelectionArea.appendChild(grid);
        } else {
            const grid = document.createElement('div');
            grid.className = 'grid-12';
            zodiacList.forEach(zod => {
                const btn = document.createElement('div');
                btn.className = 'bet-option';
                if (selectedValues.has(zod)) btn.classList.add('selected');
                btn.innerText = zod;
                btn.addEventListener('click', () => {
                    if (!currentUser) { showCenterToast("请先登录"); return; }
                    if (phase !== 'betting') { showCenterToast("开奖中，请等待下期"); return; }
                    if (userBanned) { showCenterToast("账号已被封禁"); return; }
                    if (selectedValues.has(zod)) selectedValues.delete(zod);
                    else selectedValues.add(zod);
                    renderBetSelection();
                    updateSelectedPreview();
                });
                grid.appendChild(btn);
            });
            betSelectionArea.appendChild(grid);
        }
        updateSelectedPreview();
    }

    function updateSelectedPreview() {
        const arr = Array.from(selectedValues);
        if (!arr.length) { selectedPreview.innerText = '未选中任何选项'; return; }
        let preview = arr.slice(0, 10).join(', ');
        if (arr.length > 10) preview += ` 等${arr.length}项`;
        selectedPreview.innerText = `✅ 已选 ${arr.length} 项: ${preview}`;
    }

    function renderBetsList() {
        if (!bets.length) { betsListContainer.innerHTML = '<div class="empty-bets">暂无投注</div>'; return; }
        let html = '';
        bets.forEach(bet => {
            let desc = bet.type === 'number' ? `🔢 特码 ${bet.value}` : (bet.type === 'zodiac' ? `🐉 特码生肖 ${bet.value}` : `🐾 平肖 ${bet.value}`);
            html += `<div class="bet-item"><span>${desc}</span><span>💰 ${bet.amount} 元</span></div>`;
        });
        betsListContainer.innerHTML = html;
    }

    async function placeBatchBet() {
        if (!currentUser) { showCenterToast("请先登录"); return; }
        if (phase !== 'betting') { showCenterToast("开奖中，请等待下期"); return; }
        if (wallet <= 0) { showCenterToast("余额不足，请充值"); return; }
        if (userBanned) { showCenterToast("账号已被封禁"); return; }
        if (selectedValues.size === 0) { showCenterToast("请至少选择一个选项"); return; }
        let singleAmount = parseInt(betAmountInput.value);
        if (isNaN(singleAmount) || singleAmount <= 0) { showCenterToast("有效金额必须大于0"); return; }
        let totalCost = singleAmount * selectedValues.size;
        if (totalCost > wallet) { showCenterToast(`余额不足，需要 ${totalCost} 元`); return; }

        // 扣款
        wallet -= totalCost;
        const userWalletRef = ref(db, `users/${currentUser.uid}/wallet`);
        await set(userWalletRef, wallet);

        // 记录本地投注
        const newBets = [];
        for (let val of selectedValues) {
            const betItem = { type: currentBetType, value: val, amount: singleAmount, timestamp: Date.now() };
            bets.push(betItem);
            newBets.push(betItem);
        }
        renderBetsList();
        showCenterToast(`下注成功！共 ${selectedValues.size} 注，合计 ${totalCost} 元`);
        betAmountInput.value = 0;
        updateWalletUI();

        // 写入全局投注节点（用于后台监控）
        const userInfoSnap = await get(ref(db, `users/${currentUser.uid}`));
        const username = userInfoSnap.val()?.username || currentUser.email?.split('@')[0] || "玩家";
        const currentBetsRef = ref(db, `current_bets/${currentUser.uid}`);
        const snapshot = await get(currentBetsRef);
        let existing = snapshot.val() || [];
        existing = existing.concat(newBets.map(b => ({ ...b, username })));
        await set(currentBetsRef, existing);
    }

    // 充值流程（与原版相同）
    function submitRecharge(amount) {
        if (!currentUser) { showCenterToast("请先登录"); return; }
        if (amount <= 0) { showCenterToast("充值金额必须大于0"); return; }
        if (userBanned) { showCenterToast("账号已被封禁，无法充值"); return; }
        const pendingRef = ref(db, `pending_recharges/${Date.now()}`);
        set(pendingRef, {
            userId: currentUser.uid,
            amount: amount,
            status: "pending",
            timestamp: Date.now()
        }).then(() => {
            showCenterToast("充值申请已提交，等待管理员确认到账");
        }).catch(() => showCenterToast("提交失败，请重试"));
    }

    function showRechargeMethods() {
        if (!currentUser) { showCenterToast("请先登录"); return; }
        if (userBanned) { showCenterToast("账号已被封禁，无法充值"); return; }
        const modal = document.createElement('div');
        modal.className = 'modal-mask';
        modal.innerHTML = `
            <div class="modal-container">
                <div class="modal-title">选择充值方式</div>
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <button id="alipayBtn" class="modal-btn modal-btn-primary">支付宝充值</button>
                    <button id="wechatBtn" class="modal-btn modal-btn-secondary">微信充值</button>
                    <button id="bankBtn" class="modal-btn modal-btn-secondary">银行卡充值</button>
                    <button id="usdtBtn" class="modal-btn modal-btn-secondary">USDT充值</button>
                </div>
                <div class="modal-buttons" style="margin-top:20px;">
                    <button id="closeRechargeModal" class="modal-btn modal-btn-secondary">取消</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const closeModal = () => modal.remove();
        modal.querySelector('#closeRechargeModal').onclick = closeModal;
        modal.querySelector('#wechatBtn').onclick = () => { showCenterToast("微信充值暂未开放"); closeModal(); };
        modal.querySelector('#bankBtn').onclick = () => { showCenterToast("银行卡充值暂未开放"); closeModal(); };
        modal.querySelector('#usdtBtn').onclick = () => { showCenterToast("USDT充值暂未开放"); closeModal(); };
        modal.querySelector('#alipayBtn').onclick = () => {
            closeModal();
            const amountModal = document.createElement('div');
            amountModal.className = 'modal-mask';
            amountModal.innerHTML = `
                <div class="modal-container">
                    <div class="modal-title">💰 充值金额</div>
                    <input type="number" id="rechargeAmount" class="modal-input" placeholder="输入金额" value="100">
                    <div class="modal-buttons">
                        <button id="cancelAmountBtn" class="modal-btn modal-btn-secondary">取消</button>
                        <button id="confirmAmountBtn" class="modal-btn modal-btn-primary">确认充值</button>
                    </div>
                </div>
            `;
            document.body.appendChild(amountModal);
            const closeAmountModal = () => amountModal.remove();
            amountModal.querySelector('#cancelAmountBtn').onclick = closeAmountModal;
            amountModal.querySelector('#confirmAmountBtn').onclick = () => {
                let amount = parseFloat(amountModal.querySelector('#rechargeAmount').value);
                if (isNaN(amount) || amount <= 0) { showCenterToast("请输入有效金额"); return; }
                closeAmountModal();
                const accountModal = document.createElement('div');
                accountModal.className = 'modal-mask';
                accountModal.innerHTML = `
                    <div class="modal-container">
                        <div class="modal-title">💰 支付宝充值</div>
                        <div style="background:#F8FAFE; padding:10px; border-radius:20px; margin:12px 0; text-align:left;">
                            <div>充值金额: <strong>${amount} 元</strong></div>
                            <div>支付宝账号1: 18277511916</div>
                            <div>支付宝账号2: 16651083995</div>
                            <div style="font-size:0.7rem; margin-top:6px;">请转账至以上任一账号</div>
                        </div>
                        <div class="modal-buttons">
                            <button id="cancelOrderBtn" class="modal-btn modal-btn-secondary">取消订单</button>
                            <button id="paidBtn" class="modal-btn modal-btn-primary">我已付款</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(accountModal);
                const closeAccountModal = () => accountModal.remove();
                accountModal.querySelector('#cancelOrderBtn').onclick = closeAccountModal;
                accountModal.querySelector('#paidBtn').onclick = () => {
                    closeAccountModal();
                    showCenterToast("正在核实中...", 1500);
                    submitRecharge(amount);
                };
            };
        };
    }

    // 结算时使用动态赔率
    async function settleUserBets() {
        if (!currentUser || bets.length === 0) return 0;
        const specialNum = currentLotteryNumbers[6];
        const specialZodiac = getZodiacByNum(specialNum);
        const allNumbers = currentLotteryNumbers;
        let totalWin = 0;
        for (let bet of bets) {
            if (bet.type === 'number' && bet.value === specialNum) totalWin += bet.amount * odds.number;
            else if (bet.type === 'zodiac' && bet.value === specialZodiac) totalWin += bet.amount * odds.zodiac;
            else if (bet.type === 'pingxiao') {
                const zodiacNums = zodiacGroups[bet.value];
                if (allNumbers.some(n => zodiacNums.includes(n))) totalWin += bet.amount * odds.pingxiao;
            }
        }
        if (totalWin > 0) {
            const userWalletRef = ref(db, `users/${currentUser.uid}/wallet`);
            await runTransaction(userWalletRef, (currentVal) => (currentVal || 0) + totalWin);
            showCenterToast(`🎉 中奖啦！ +${totalWin}元 🎉`);
        } else if (bets.length) {
            showCenterToast(`😞 未中奖，特码 ${specialNum} (${specialZodiac})`);
        }
        return totalWin;
    }

    async function saveHistoryToDB(issue, numbers, betsCopy) {
        const historyRef = ref(db, 'history');
        const snapshot = await get(historyRef);
        let history = snapshot.val() || [];
        const newRecord = {
            issue: issue,
            numbers: numbers,
            timeStr: new Date().toLocaleTimeString(),
            bets: JSON.parse(JSON.stringify(betsCopy))
        };
        history.unshift(newRecord);
        if (history.length > 15) history = history.slice(0, 15);
        await set(historyRef, history);
    }

    async function performGlobalDraw() {
        if (isDrawing) return;
        isDrawing = true;
        phase = "drawing";
        statusBadge.innerText = "🎲 开奖中...";
        placeBetBtn.disabled = true;
        if (countdownInterval) clearInterval(countdownInterval);

        const newNumbers = generateUniqueNumbers();
        await startRollingAnimation(newNumbers);
        await settleUserBets();
        await saveHistoryToDB(currentIssue, currentLotteryNumbers, bets);

        // 清空本期投注
        bets = [];
        selectedValues.clear();
        renderBetsList();
        renderBetSelection();

        const newIssue = currentIssue + 1;
        const newNextDrawTimestamp = Date.now() + drawInterval * 1000;
        const stateRef = ref(db, 'lottery_state');
        await set(stateRef, {
            currentIssue: newIssue,
            currentNumbers: newNumbers,
            nextDrawTimestamp: newNextDrawTimestamp,
            isDrawing: false
        });

        // 清空全局 current_bets
        if (currentUser) {
            await set(ref(db, `current_bets/${currentUser.uid}`), null);
        }

        currentIssue = newIssue;
        currentLotteryNumbers = newNumbers;
        nextDrawTimestamp = newNextDrawTimestamp;
        phase = "betting";
        statusBadge.innerText = "📊 投注中";
        isDrawing = false;
        updateWalletUI();
        startLocalCountdown();
    }

    async function startRollingAnimation(finalNumbers) {
        let tempNumbers = [...currentLotteryNumbers];
        if (!tempNumbers.length) tempNumbers = finalNumbers;
        renderDrawNumbers(tempNumbers);
        for (let pos = 0; pos < 7; pos++) {
            await new Promise(resolve => {
                let rollCount = 0;
                const rollInterval = setInterval(() => {
                    const fakeNum = Math.floor(Math.random() * 49) + 1;
                    let displayArr = [...tempNumbers];
                    displayArr[pos] = fakeNum;
                    renderDrawNumbers(displayArr);
                    rollCount++;
                    if (rollCount >= 25) {
                        clearInterval(rollInterval);
                        displayArr[pos] = finalNumbers[pos];
                        renderDrawNumbers(displayArr);
                        tempNumbers = displayArr;
                        resolve();
                    }
                }, 80);
            });
        }
    }

    function triggerGlobalDraw() {
        if (isDrawing || phase !== 'betting') return;
        performGlobalDraw();
    }

    function startLocalCountdown() {
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            if (phase !== 'betting') return;
            if (nextDrawTimestamp) {
                const remaining = Math.max(0, Math.floor((nextDrawTimestamp - Date.now()) / 1000));
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                countdownDisplay.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                if (remaining <= 0 && !isDrawing) {
                    clearInterval(countdownInterval);
                    triggerGlobalDraw();
                }
            }
        }, 1000);
    }

    function listenLotteryState() {
        const stateRef = ref(db, 'lottery_state');
        onValue(stateRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                currentIssue = data.currentIssue || 101;
                currentLotteryNumbers = data.currentNumbers || [];
                nextDrawTimestamp = data.nextDrawTimestamp || 0;
                issueNumberSpan.innerText = `第${currentIssue}期`;
                if (!isDrawing && currentLotteryNumbers.length) {
                    renderDrawNumbers(currentLotteryNumbers);
                }
            }
        });
    }

    function listenHistory() {
        const historyRef = ref(db, 'history');
        onValue(historyRef, (snapshot) => {
            const data = snapshot.val();
            historyRecords = data ? data.slice(0, 15) : [];
            renderHistoryTab();
        });
    }

    function renderHistoryTab() {
        const currentHistoryTab = document.querySelector('.history-tab.active')?.getAttribute('data-hist') || 'draw';
        if (currentHistoryTab === 'draw') {
            if (!historyRecords.length) { historyContainer.innerHTML = '<div style="text-align:center;color:#8CA0B5;">暂无开奖记录</div>'; return; }
            let html = '';
            for (let rec of historyRecords) {
                const isExpanded = expandedBetIssues.has(rec.issue);
                html += `<div class="history-item">
                            <div class="history-header-line" data-issue="${rec.issue}">
                                <span>📅 第${rec.issue}期  ${rec.timeStr}</span>
                                <span class="expand-icon">${isExpanded ? '▲' : '▼'}</span>
                            </div>
                            <div class="history-numbers">`;
                rec.numbers.forEach((num, idx) => {
                    const extraClass = idx===6 ? 'special-ball' : '';
                    html += `<div class="history-ball-item">
                                <div class="history-ball ${getNumberColor(num)} ${extraClass}">${num<10?'0'+num:num}</div>
                                <div class="history-zodiac">(${getZodiacByNum(num)})</div>
                            </div>`;
                });
                html += `</div>`;
                if (isExpanded && rec.bets && rec.bets.length) {
                    html += `<div class="bet-detail"><strong>📌 投注明细</strong><br>`;
                    rec.bets.forEach(b => {
                        let desc = b.type === 'number' ? `特码${b.value}` : (b.type === 'zodiac' ? `特肖${b.value}` : `平肖${b.value}`);
                        html += `• ${desc} × ${b.amount}元<br>`;
                    });
                    html += `</div>`;
                } else if (isExpanded) {
                    html += `<div class="bet-detail">无投注记录</div>`;
                }
                html += `</div>`;
            }
            historyContainer.innerHTML = html;
            document.querySelectorAll('.history-header-line').forEach(el => {
                el.addEventListener('click', (e) => {
                    const issue = parseInt(el.getAttribute('data-issue'));
                    if (expandedBetIssues.has(issue)) expandedBetIssues.delete(issue);
                    else expandedBetIssues.add(issue);
                    renderHistoryTab();
                });
            });
        } else {
            if (!historyRecords.length) { historyContainer.innerHTML = '<div style="text-align:center;color:#8CA0B5;">暂无投注记录</div>'; return; }
            let html = '';
            for (let rec of historyRecords) {
                html += `<div class="history-item">
                            <div><strong>第${rec.issue}期</strong>  ${rec.timeStr}</div>`;
                if (rec.bets && rec.bets.length) {
                    html += `<div class="bet-detail" style="margin-top:6px;">`;
                    rec.bets.forEach(b => {
                        let desc = b.type === 'number' ? `特码${b.value}` : (b.type === 'zodiac' ? `特肖${b.value}` : `平肖${b.value}`);
                        html += `• ${desc} × ${b.amount}元<br>`;
                    });
                    html += `</div>`;
                } else {
                    html += `<div class="bet-detail">本期无投注</div>`;
                }
                html += `</div>`;
            }
            historyContainer.innerHTML = html;
        }
    }

    // 注册/登录逻辑（与原版相同）
    async function isUsernameUnique(username) {
        const snapshot = await get(ref(db, 'usernames'));
        const map = snapshot.val() || {};
        return !Object.values(map).includes(username);
    }
    async function isPhoneUnique(phone) {
        const snapshot = await get(ref(db, 'phones'));
        const map = snapshot.val() || {};
        return !Object.values(map).includes(phone);
    }
    async function registerWithPhone(username, phone, password) {
        if (!username.trim()) throw new Error("用户名不能为空");
        if (!/^1[3-9]\d{9}$/.test(phone)) throw new Error("手机号格式不正确");
        if (password.length < 6) throw new Error("密码至少6位");
        if (!(await isUsernameUnique(username))) throw new Error("用户名已被占用");
        if (!(await isPhoneUnique(phone))) throw new Error("手机号已被注册");
        const fakeEmail = `${phone}@phone.local`;
        const userCred = await createUserWithEmailAndPassword(auth, fakeEmail, password);
        const uid = userCred.user.uid;
        await set(ref(db, `users/${uid}`), {
            username: username,
            phone: phone,
            wallet: 0,
            banned: false
        });
        await set(ref(db, `usernames/${uid}`), username);
        await set(ref(db, `phones/${uid}`), phone);
        return userCred;
    }
    async function loginWithPhone(phone, password) {
        const fakeEmail = `${phone}@phone.local`;
        await signInWithEmailAndPassword(auth, fakeEmail, password);
    }
    function showLoginRegister() {
        const modal = document.createElement('div');
        modal.className = 'modal-mask';
        modal.innerHTML = `
            <div class="modal-container">
                <div class="modal-title">登录 / 注册</div>
                <input type="text" id="regUsername" class="modal-input" placeholder="用户名 (注册时填写)">
                <input type="tel" id="phoneInput" class="modal-input" placeholder="手机号">
                <input type="password" id="passwordInput" class="modal-input" placeholder="密码">
                <div class="modal-buttons">
                    <button id="loginSubmit" class="modal-btn modal-btn-primary">登录</button>
                    <button id="registerSubmit" class="modal-btn modal-btn-secondary">注册</button>
                    <button id="closeLoginModal" class="modal-btn modal-btn-secondary">取消</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const closeModal = () => modal.remove();
        const phoneInput = modal.querySelector('#phoneInput');
        const pwdInput = modal.querySelector('#passwordInput');
        const usernameInput = modal.querySelector('#regUsername');
        modal.querySelector('#loginSubmit').onclick = async () => {
            const phone = phoneInput.value.trim();
            const pwd = pwdInput.value;
            try {
                await loginWithPhone(phone, pwd);
                showCenterToast("登录成功");
                closeModal();
            } catch (err) {
                showCenterToast("登录失败: " + err.message);
            }
        };
        modal.querySelector('#registerSubmit').onclick = async () => {
            const username = usernameInput.value.trim();
            const phone = phoneInput.value.trim();
            const pwd = pwdInput.value;
            try {
                await registerWithPhone(username, phone, pwd);
                showCenterToast("注册成功，已自动登录");
                closeModal();
            } catch (err) {
                showCenterToast("注册失败: " + err.message);
            }
        };
        modal.querySelector('#closeLoginModal').onclick = closeModal;
    }

    // 用户状态监听
    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (user) {
            const userSnap = await get(ref(db, `users/${user.uid}`));
            const userData = userSnap.val();
            const displayName = userData?.username || user.email?.split('@')[0] || "玩家";
            userInfoSpan.innerText = `👤 ${displayName}`;
            loginBtn.innerText = "登出";
            loginBtn.onclick = () => signOut(auth);
            const walletRef = ref(db, `users/${user.uid}/wallet`);
            onValue(walletRef, (snap) => {
                wallet = snap.val() || 0;
                updateWalletUI();
            });
            listenUserBanned(user.uid);
            bets = [];
            selectedValues.clear();
            renderBetsList();
            renderBetSelection();
            updateWalletUI();
        } else {
            userInfoSpan.innerText = "未登录";
            loginBtn.innerText = "登录/注册";
            loginBtn.onclick = showLoginRegister;
            wallet = 0;
            updateWalletUI();
            bets = [];
            selectedValues.clear();
            renderBetsList();
            renderBetSelection();
        }
    });

    // 初始化
    async function init() {
        await loadDrawInterval();
        await initializeLotteryState();
        listenLotteryState();
        listenHistory();
        listenAnnouncement();
        listenOdds();
        startLocalCountdown();
        renderDrawNumbers([]);
        renderBetSelection();
        renderBetsList();
        betAmountInput.value = 0;
        placeBetBtn.addEventListener('click', placeBatchBet);
        rechargeBtn.addEventListener('click', showRechargeMethods);
        withdrawBtn.addEventListener('click', () => showCenterToast("提现功能暂未开放"));
        collapseHeader.addEventListener('click', () => {
            isCollapsed = !isCollapsed;
            betContent.classList.toggle('collapsed', isCollapsed);
            collapseIcon.style.transform = isCollapsed ? 'rotate(-90deg)' : 'rotate(0deg)';
        });
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (!currentUser) { showCenterToast("请先登录"); return; }
                if (phase !== 'betting') { showCenterToast("开奖中，请等待下期"); return; }
                if (userBanned) { showCenterToast("账号已被封禁"); return; }
                const type = btn.getAttribute('data-type');
                currentBetType = type;
                selectedValues.clear();
                renderBetSelection();
                document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
            });
        });
        document.querySelectorAll('.history-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const type = tab.getAttribute('data-hist');
                document.querySelectorAll('.history-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderHistoryTab();
            });
        });
    }
    init();
</script>
